<!DOCTYPE html>
<html lang="en" style="font-size: {{SIZE_SCALE}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torah Laws</title>
{{FONT_IMPORTS}}
<style>
/* ── CSS Custom Properties ── */
:root {
{{THEME_VARS}}
  --heading-font: {{HEADING_FONT}};
  --body-font: {{BODY_FONT}};
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  font-family: var(--body-font);
  background: var(--bg-deep);
  color: rgba(var(--text-primary), 0.9);
  overflow: hidden;
}

/* ── SVG Icons (inline replacements for lucide-react) ── */
.icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 1em; height: 1em; vertical-align: middle; flex-shrink: 0;
}
.icon svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Accordion Container ── */
.accordion-container {
  position: relative; width: 100%; height: 100%;
  background: var(--bg-deep); overflow: hidden;
  display: flex; flex-direction: column;
  transition: background 0.3s ease;
}

/* ── Header ── */
.accordion-header {
  position: relative; padding: 14px 20px;
  background: linear-gradient(180deg, color-mix(in srgb, var(--bg-deep) 95%, transparent) 0%, color-mix(in srgb, var(--bg-deep) 70%, transparent) 100%);
  z-index: 10; display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; border-bottom: 1px solid var(--border); transition: background 0.3s ease;
}
.accordion-header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.accordion-header-center { display: flex; align-items: center; justify-content: center; flex: 1; }
.accordion-header-center .header-search { position: relative; }
.accordion-header-center .search-container { position: relative; display: flex; align-items: center; }
.accordion-header-center .search-input { width: 340px; }
.accordion-header-center .search-dropdown { left: 50%; right: auto; transform: translateX(-50%); }
.accordion-header-right { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex: 1; }

/* ── Breadcrumbs ── */
.breadcrumbs { font-family: var(--body-font); font-size: 0.625em; letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
.breadcrumb { display: flex; align-items: center; gap: 6px; }
.breadcrumb .sep { color: rgba(var(--text-dim), 0.4); font-weight: 300; }
.breadcrumb-btn { background: none; border: none; padding: 2px 4px; font-family: var(--body-font); font-size: calc(1em * var(--typo-ui-adjust, 1)); letter-spacing: 1.5px; text-transform: uppercase; color: rgba(var(--text-muted), 0.5); cursor: pointer; transition: color 0.3s ease; border-radius: 3px; }
.breadcrumb-btn:hover:not(:disabled) { color: rgba(var(--text-secondary), 0.85); text-decoration: underline; text-underline-offset: 3px; }
.breadcrumb-btn.active { color: rgba(var(--text-secondary), 0.85); cursor: default; }
.breadcrumb-btn:disabled { cursor: default; }

/* ── Nav / Search buttons ── */
.nav-btn { background: var(--fill-subtle); border: 1px solid var(--border); border-radius: 6px; padding: 6px; color: rgba(var(--text-muted), 0.7); cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover { background: var(--fill-hover); border-color: var(--border-hover); color: rgba(var(--text-secondary), 0.9); box-shadow: 0 0 12px rgba(var(--gold), 0.1); }

/* ── Search ── */
.search-icon { position: absolute; left: 8px; width: 14px; height: 14px; color: rgba(var(--text-dim), 0.4); pointer-events: none; z-index: 1; }
.search-input { width: 260px; padding: 6px 28px 6px 28px; background: var(--fill-subtle); border: 1px solid var(--border); border-radius: 6px; color: rgba(var(--text-primary), 0.9); font-family: var(--body-font); font-size: calc(0.6875em * var(--typo-ui-adjust, 1)); letter-spacing: 0.5px; outline: none; transition: all 0.2s ease; }
.search-input::placeholder { color: rgba(var(--text-dim), 0.35); }
.search-input:focus { border-color: var(--border-hover); background: var(--fill-hover); box-shadow: 0 0 12px rgba(var(--gold), 0.08); }
.search-close { position: absolute; right: 6px; background: none; border: none; color: rgba(var(--text-dim), 0.4); cursor: pointer; padding: 3px; display: flex; align-items: center; }
.search-close:hover { color: rgba(var(--text-secondary), 0.8); }
.search-dropdown { position: absolute; top: 100%; right: 0; width: 380px; max-height: 420px; overflow-y: auto; margin-top: 6px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); z-index: 30; scrollbar-width: thin; scrollbar-color: rgba(var(--gold), 0.12) transparent; }
.search-dropdown::-webkit-scrollbar { width: 4px; }
.search-dropdown::-webkit-scrollbar-thumb { background: rgba(var(--gold), 0.15); border-radius: 2px; }
.search-result { display: flex; flex-direction: column; gap: 2px; width: 100%; padding: 10px 14px; background: none; border: none; border-bottom: 1px solid rgba(var(--gold), 0.05); cursor: pointer; text-align: left; transition: background 0.15s ease; }
.search-result:hover { background: var(--fill-hover); }
.search-result:last-child { border-bottom: none; }
.search-result-ref { font-family: var(--body-font); font-size: 0.625em; letter-spacing: 1px; color: rgba(var(--gold-bright), 0.8); font-weight: bold; }
.search-result-title { font-family: var(--body-font); font-size: 0.625em; color: rgba(var(--text-secondary), 0.55); line-height: 1.3; }
.search-no-results { padding: 14px; text-align: center; font-family: var(--body-font); font-size: 0.625em; color: rgba(var(--text-dim), 0.35); letter-spacing: 1px; }

/* ── Scrollable body ── */
.accordion-body { position: relative; flex: 1; overflow-y: auto; z-index: 1; padding: 16px 20px 80px; scrollbar-width: thin; scrollbar-color: rgba(var(--gold), 0.12) transparent; transition: margin-right 0.3s ease; }
.accordion-body::-webkit-scrollbar { width: 6px; }
.accordion-body::-webkit-scrollbar-thumb { background: rgba(var(--gold), 0.15); border-radius: 3px; }
.accordion-body.panel-open { margin-right: 440px; transition: margin-right 0.3s ease; }

/* ── Generic accordion row ── */
.accordion-row { display: flex; align-items: center; width: 100%; padding: 0; background: none; border: none; cursor: pointer; text-align: left; transition: all 0.2s ease; gap: 12px; }
.accordion-chevron { flex-shrink: 0; display: flex; align-items: center; color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.7); transition: color 0.2s ease; }
.accordion-row:hover .accordion-chevron { color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.95); }
.accordion-row-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.accordion-row-count { flex-shrink: 0; font-family: var(--body-font); font-size: calc(0.75em * var(--typo-ui-adjust, 1)); letter-spacing: 1px; color: rgba(var(--text-secondary), 0.75); }
.accordion-row.open .accordion-row-count { display: none; }

/* ── Root level ── */
.accordion-root { margin-bottom: 6px; }
.accordion-row-root { padding: 20px 18px; border-radius: 8px; background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.03); border: 1px solid rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.08); }
.accordion-row-root:hover { background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.07); border-color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.15); }
.accordion-row-root.open { background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.06); border-color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.18); }
.accordion-root-label { font-family: var(--heading-font); font-size: calc(1.75em * var(--typo-title-adjust, 1)); font-weight: 600; letter-spacing: 1px; color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 1); }
.accordion-root-subtitle { font-family: var(--heading-font); font-size: calc(1.125em * var(--typo-subtitle-adjust, 1)); font-style: italic; color: rgba(var(--text-secondary), 0.8); flex-shrink: 0; }
.accordion-root-content { padding: 6px 0 6px 8px; }

/* ── Level 2 ── */
.accordion-l2 { margin: 2px 0; }
.accordion-row-l2 { padding: 15px 16px 15px 24px; border-radius: 6px; border: 1px solid transparent; }
.accordion-row-l2:hover { background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.06); border-color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.1); }
.accordion-row-l2.open { background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.05); border-color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.12); }
.accordion-row-l2 .accordion-row-label { font-family: var(--body-font); font-size: calc(0.9375em * var(--typo-category-adjust, 1)); letter-spacing: 1.5px; text-transform: uppercase; color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.95); font-weight: 500; }
.accordion-l2-num { color: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.7); font-weight: 400; }
.accordion-l2-content { padding: 2px 0 2px 16px; }

/* ── Level 3 ── */
.accordion-l3 { margin: 1px 0; }
.accordion-row-l3 { padding: 12px 16px 12px 32px; border-radius: 5px; border: 1px solid transparent; }
.accordion-row-l3:hover { background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.05); }
.accordion-row-l3.open { background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.04); }
.accordion-row-l3 .accordion-row-label { font-size: calc(1em * var(--typo-category-adjust, 1)); color: rgba(var(--text-secondary), 0.9); }
.accordion-l3-content { padding: 2px 0 2px 12px; }

/* ── Level 4 ── */
.accordion-l4 { margin: 1px 0; }
.accordion-row-l4 { padding: 10px 16px 10px 40px; border-radius: 4px; border: 1px solid transparent; }
.accordion-row-l4:hover { background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.04); }
.accordion-row-l4.open { background: rgba(var(--cat-r, 210), var(--cat-g, 180), var(--cat-b, 120), 0.03); }
.accordion-row-l4 .accordion-row-label { font-size: calc(0.9375em * var(--typo-category-adjust, 1)); color: rgba(var(--text-secondary), 0.85); }

/* ── Law rows ── */
.accordion-laws { padding: 4px 0 8px 24px; }
.accordion-law { display: flex; align-items: center; gap: 14px; width: 100%; padding: 11px 14px; background: none; border: none; border-radius: 4px; cursor: pointer; text-align: left; transition: all 0.15s ease; border-left: 2px solid rgba(var(--gold), 0.12); font-family: inherit; font-size: inherit; color: inherit; }
.accordion-law:hover { background: rgba(var(--gold), 0.08); border-left-color: rgba(var(--gold), 0.4); }
.accordion-law.selected { background: rgba(var(--gold), 0.12); border-left-color: rgba(var(--gold), 0.6); }
.accordion-law-ref { flex-shrink: 0; font-family: var(--body-font); font-size: calc(0.875em * var(--typo-law-adjust, 1)); font-weight: 600; letter-spacing: 0.5px; min-width: 120px; }
.accordion-law-summary { flex: 1; font-size: calc(0.9375em * var(--typo-law-adjust, 1)); color: rgba(var(--text-primary), 0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.accordion-law-obs { flex-shrink: 0; font-size: 1em; opacity: 0.9; }

/* ── Side Panel ── */
.side-panel { position: absolute; top: 0; right: 0; bottom: 0; width: 440px; max-width: 90%; background: var(--bg-surface); border-left: 1px solid var(--border); z-index: 20; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; overflow: hidden; }
.side-panel.open { transform: translateX(0); }
.side-panel-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 20px 22px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.side-panel-title-area { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.side-panel-title { font-family: var(--heading-font); font-size: calc(1.25em * var(--typo-panel-adjust, 1)); font-weight: 600; letter-spacing: 0.5px; color: rgba(var(--text-primary), 0.92); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.side-panel-eternal-icon { color: rgb(var(--rose)); flex-shrink: 0; }
.side-panel-close { background: var(--fill-subtle); border: 1px solid var(--border); border-radius: 5px; padding: 6px; color: rgba(var(--text-muted), 0.6); cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; display: flex; align-items: center; }
.side-panel-close:hover { background: var(--fill-hover); color: rgba(var(--text-secondary), 0.9); }

/* ── Side Panel Tabs ── */
.side-panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.side-panel-tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 0; background: none; border: none; border-bottom: 2px solid transparent; color: rgba(var(--text-dim), 0.5); font-family: var(--body-font); font-size: calc(0.6875em * var(--typo-ui-adjust, 1)); letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; }
.side-panel-tab:hover { color: rgba(var(--text-secondary), 0.7); background: var(--fill-subtle); }
.side-panel-tab.active { color: rgba(var(--gold-bright), 0.85); border-bottom-color: rgba(var(--gold), 0.5); }

.side-panel-body { flex: 1; overflow-y: auto; padding: 20px 22px; scrollbar-width: thin; scrollbar-color: rgba(var(--gold), 0.12) transparent; }
.side-panel-body::-webkit-scrollbar { width: 4px; }
.side-panel-body::-webkit-scrollbar-thumb { background: rgba(var(--gold), 0.15); border-radius: 2px; }

.side-panel-section { margin-bottom: 20px; }
.side-panel-label { font-family: var(--body-font); font-size: calc(0.625em * var(--typo-ui-adjust, 1)); letter-spacing: 1.5px; text-transform: uppercase; color: rgba(var(--gold), 0.55); margin: 0 0 8px; display: flex; align-items: center; }
.side-panel-label .icon { margin-right: 5px; }
.side-panel-verse { font-family: var(--heading-font); font-size: calc(1.1875em * var(--typo-panel-adjust, 1)); line-height: 1.75; color: rgba(var(--text-primary), 0.85); border-left: 2px solid rgba(var(--gold), 0.25); padding-left: 14px; margin: 0; font-style: italic; }
.side-panel-text { font-size: calc(0.875em * var(--typo-panel-adjust, 1)); line-height: 1.6; color: rgba(var(--text-secondary), 0.78); margin: 0; }

.side-panel-grid .side-panel-field { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(var(--gold), 0.05); }
.side-panel-field-label { font-size: calc(0.8125em * var(--typo-ui-adjust, 1)); color: rgba(var(--text-dim), 0.55); }
.side-panel-field-value { font-size: calc(0.8125em * var(--typo-ui-adjust, 1)); color: rgba(var(--text-secondary), 0.78); text-transform: capitalize; }

.side-panel-eternal { background: rgba(var(--rose), 0.05); border: 1px solid rgba(var(--rose), 0.1); border-radius: 6px; padding: 12px 14px; }
.side-panel-phrase { color: rgba(var(--rose-bright), 0.82); font-style: italic; font-family: var(--heading-font); font-size: calc(1.125em * var(--typo-panel-adjust, 1)); }
.side-panel-prereq { font-size: 0.8125em; color: rgba(var(--amber), 0.68); margin: 4px 0; }
.side-panel-observance { display: flex; align-items: center; gap: 4px; }

/* Clickable verse references */
.side-panel-refs { display: flex; flex-wrap: wrap; gap: 6px; }
.verse-ref-btn { padding: 5px 10px; background: var(--fill-subtle); border: 1px solid var(--border); border-radius: 4px; color: rgba(var(--gold-bright), 0.7); font-family: var(--body-font); font-size: calc(0.6875em * var(--typo-ui-adjust, 1)); letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s ease; }
.verse-ref-btn:hover { background: var(--fill-hover); border-color: var(--border-hover); color: rgba(var(--gold-bright), 0.95); box-shadow: 0 0 8px rgba(var(--gold), 0.1); }

/* Fetched verse display */
.side-panel-fetched-verse { background: rgba(var(--gold), 0.04); border: 1px solid rgba(var(--gold), 0.1); border-radius: 6px; padding: 12px !important; margin-top: 4px; }
.fetched-verse-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.fetched-verse-header .side-panel-label { margin: 0; color: rgba(var(--gold-bright), 0.65); }
.fetched-verse-close { background: none; border: none; color: rgba(var(--text-dim), 0.4); cursor: pointer; padding: 2px; display: flex; align-items: center; transition: color 0.2s ease; }
.fetched-verse-close:hover { color: rgba(var(--text-secondary), 0.8); }
.fetched-verse-loading { color: rgba(var(--text-dim), 0.45); font-style: italic; }
.fetched-verse-error { color: rgba(var(--error), 0.7); }

/* Keyword tags */
.keyword-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.keyword-tag { padding: 4px 10px; background: rgba(var(--rose), 0.06); border: 1px solid rgba(var(--rose), 0.14); border-radius: 10px; color: rgba(var(--rose-bright), 0.6); font-family: var(--body-font); font-size: calc(0.625em * var(--typo-ui-adjust, 1)); letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s ease; }
.keyword-tag:hover { background: rgba(var(--rose), 0.14); border-color: rgba(var(--rose), 0.3); color: rgba(var(--rose-bright), 0.92); box-shadow: 0 0 8px rgba(var(--rose), 0.12); }

/* Keyword search results */
.side-panel-keyword-results { background: rgba(var(--rose), 0.03); border: 1px solid rgba(var(--rose), 0.08); border-radius: 6px; padding: 12px !important; }
.keyword-results-list { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(var(--rose), 0.12) transparent; }
.keyword-results-list::-webkit-scrollbar { width: 3px; }
.keyword-results-list::-webkit-scrollbar-thumb { background: rgba(var(--rose), 0.15); border-radius: 2px; }
.keyword-result-item { padding-bottom: 8px; border-bottom: 1px solid rgba(var(--gold), 0.05); }
.keyword-result-item:last-child { border-bottom: none; padding-bottom: 0; }
.keyword-result-ref { background: none; border: none; padding: 0; color: rgba(var(--gold-bright), 0.7); font-family: var(--body-font); font-size: 0.6875em; letter-spacing: 0.5px; font-weight: bold; cursor: pointer; transition: color 0.2s ease; margin-bottom: 4px; display: block; }
.keyword-result-ref:hover { color: rgba(var(--gold-bright), 0.95); text-decoration: underline; text-underline-offset: 2px; }
.keyword-result-text { font-size: 0.75em; line-height: 1.5; color: rgba(var(--text-secondary), 0.55); margin: 0; }
.keyword-result-text mark { background: rgba(var(--rose), 0.18); color: rgba(var(--rose-bright), 0.9); border-radius: 2px; padding: 0 2px; }

.side-panel-meta { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(var(--gold), 0.06); font-family: var(--body-font); font-size: 0.5em; color: rgba(var(--text-dim), 0.3); letter-spacing: 0.5px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .accordion-header { padding: 10px 14px; }
  .accordion-body { padding: 10px 12px 80px; }
  .accordion-body.panel-open { margin-right: 0; }
  .accordion-row-root { padding: 14px 12px; }
  .accordion-root-label { font-size: calc(1.375em * var(--typo-title-adjust, 1)); }
  .accordion-root-subtitle { display: none; }
  .accordion-row-l2 { padding-left: 16px; }
  .accordion-row-l3 { padding-left: 24px; }
  .accordion-row-l4 { padding-left: 32px; }
  .accordion-law-ref { min-width: 80px; font-size: calc(0.75em * var(--typo-law-adjust, 1)); }
  .accordion-law-summary { font-size: calc(0.8125em * var(--typo-law-adjust, 1)); }
  .side-panel { width: 100%; max-width: 100%; }
  .search-input { width: 180px; font-size: 0.625em; }
  .search-dropdown { width: 280px; }
  .accordion-header-center .search-input { width: 200px; }
}

/* ── Typography overrides ── */
{{TYPOGRAPHY_CSS}}
</style>
</head>
<body>

<div id="app" class="accordion-container">
  <!-- Header -->
  <div class="accordion-header">
    <div class="accordion-header-left">
      <div class="breadcrumbs" id="breadcrumbs"></div>
    </div>
    <div class="accordion-header-center">
      <div class="header-search" id="header-search">
        <button class="nav-btn" id="search-toggle" title="Search laws">
          <span class="icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        </button>
      </div>
    </div>
    <div class="accordion-header-right">
      <button class="nav-btn" id="theme-toggle" title="Toggle light/dark mode">
        <span class="icon" id="theme-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
      </button>
    </div>
  </div>

  <!-- Accordion body -->
  <div class="accordion-body" id="accordion-body"></div>

  <!-- Side panel -->
  <div class="side-panel" id="side-panel">
    <div class="side-panel-header">
      <div class="side-panel-title-area">

          <svg viewBox="0 0 24 24" style="width:20px;height:20px"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>

{{DATA_SCRIPT}}

<script>
// ── Constants & Helpers ─────────────────────────────────────────────────────

const LEVEL2_CONFIG = {
  'know-fear-cling':  { label: 'KNOW, FEAR & CLING', short: '(1)', color: [220, 190, 130] },
  'no-idolatry':      { label: 'NO IDOLATRY', short: '(2)', color: [200, 170, 120] },
  'gods-name':        { label: "GOD'S NAME", short: '(3)', color: [210, 180, 125] },
  'sacred-times':     { label: 'SACRED TIMES', short: '(4)', color: [230, 195, 140] },
  'honor-parents':    { label: 'HONOR PARENTS', short: '(5)', color: [170, 195, 130] },
  'no-murder':        { label: 'DO NOT MURDER', short: '(6)', color: [155, 185, 125] },
  'no-adultery':      { label: 'NO ADULTERY', short: '(7)', color: [185, 170, 130] },
  'no-steal':         { label: 'DO NOT STEAL', short: '(8)', color: [195, 180, 120] },
  'no-false-witness': { label: 'NO FALSE WITNESS', short: '(9)', color: [190, 175, 125] },
  'no-covet':         { label: 'DO NOT COVET', short: '(10)', color: [180, 165, 120] },
};

const OBSERVANCE_CONFIG = {
  already_observing:        { label: 'Christians Already Do',    symbol: '\u2714', color: '#6bcf7f' },
  should_observe:           { label: 'Should Observe',           symbol: '\u2605', color: '#e0c060' },
  situational:              { label: 'Situational',              symbol: '\u25C7', color: '#8ca0b4' },
  observe_in_principle:     { label: 'Observe in Principle',     symbol: '\u25CB', color: '#c8a878' },
  cannot_currently_observe: { label: 'Cannot Currently Observe', symbol: '\u29B8', color: '#c08888' },
  aware_in_principle:       { label: 'Aware in Principle',       symbol: '\u25B3', color: '#9a9a9a' },
  voluntary:                { label: 'Voluntary',                symbol: '\u2661', color: '#b090d0' },
};

const BOOK_NAMES = {
  1:'Genesis',2:'Exodus',3:'Leviticus',4:'Numbers',5:'Deuteronomy',6:'Joshua',7:'Judges',8:'Ruth',
  9:'1 Samuel',10:'2 Samuel',11:'1 Kings',12:'2 Kings',13:'1 Chronicles',14:'2 Chronicles',
  15:'Ezra',16:'Nehemiah',17:'Esther',18:'Job',19:'Psalms',20:'Proverbs',21:'Ecclesiastes',
  22:'Song of Solomon',23:'Isaiah',24:'Jeremiah',25:'Lamentations',26:'Ezekiel',27:'Daniel',
  28:'Hosea',29:'Joel',30:'Amos',31:'Obadiah',32:'Jonah',33:'Micah',34:'Nahum',35:'Habakkuk',
  36:'Zephaniah',37:'Haggai',38:'Zechariah',39:'Malachi',40:'Matthew',41:'Mark',42:'Luke',
  43:'John',44:'Acts',45:'Romans',46:'1 Corinthians',47:'2 Corinthians',48:'Galatians',
  49:'Ephesians',50:'Philippians',51:'Colossians',52:'1 Thessalonians',53:'2 Thessalonians',
  54:'1 Timothy',55:'2 Timothy',56:'Titus',57:'Philemon',58:'Hebrews',59:'James',60:'1 Peter',
  61:'2 Peter',62:'1 John',63:'2 John',64:'3 John',65:'Jude',66:'Revelation',
};

const STOP_WORDS = new Set([
  'the','a','an','and','or','but','in','on','at','to','for','of','with','by','from','is','it',
  'its','that','this','was','are','be','has','had','have','he','she','his','her','him','you',
  'your','they','them','their','we','our','who','whom','which','what','will','shall','may','not',
  'no','nor','if','as','so','do','did','does','been','being','were','am','i','me','my','all',
  'each','every','any','one','two','into','out','up','also','than','then','said','says','say',
  'when','there','here','more','must','about','over','such','after','before','these','those',
  'own','how','because','would','could','should','make','can','upon','let','us','come','came',
  'give','gave','take','took','went','go','among','through','under',
]);

function extractKeywords(text, maxCount = 12) {
  if (!text) return [];
  const words = text.replace(/["""''.,;:!?()[\]{}<>—–\-\/\\]/g, ' ')
    .split(/\s+/).map(w => w.toLowerCase().trim())
    .filter(w => w.length > 3 && !STOP_WORDS.has(w) && !/^\d+$/.test(w));
  const seen = new Set(), unique = [];
  for (const w of words) { if (!seen.has(w)) { seen.add(w); unique.push(w); } }
  return unique.slice(0, maxCount);
}

function getShortTitle(law, maxLen = 50) {
  let title = law.law_summary || law.reference;
  title = title.replace(/^(The law that|Law that|Command to|Requirement to|Prohibition against|You shall|You must|Do not)\s+/i, '');
  title = title.charAt(0).toUpperCase() + title.slice(1);
  if (title.length > maxLen) title = title.substring(0, maxLen) + '...';
  return title;
}

function formatLabel(key) {
  return key.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function buildHierarchyTree(laws) {
  const tree = {};
  laws.forEach(law => {
    (law.categories || []).forEach(path => {
      const parts = path.split(' > ').map(s => s.trim());
      let node = tree;
      parts.forEach((part, depth) => {
        if (!node[part]) node[part] = { _laws: [], _children: {} };
        if (depth === parts.length - 1) node[part]._laws.push(law);
        node = node[part]._children;
      });
    });
  });
  return tree;
}

function countAllLaws(node) {
  if (!node) return 0;
  let count = (node._laws || []).length;
  Object.values(node._children || {}).forEach(child => { count += countAllLaws(child); });
  return count;
}

function collectAllLaws(node) {
  if (!node) return [];
  const laws = [...(node._laws || [])];
  Object.values(node._children || {}).forEach(child => { laws.push(...collectAllLaws(child)); });
  const seen = new Set();
  return laws.filter(law => { if (seen.has(law.id)) return false; seen.add(law.id); return true; });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Darken category colors in light mode so they're readable on light backgrounds
function catColor(color) {
  if (!lightMode) return color;
  return color.map(c => Math.round(c * 0.28));
}

// ── SVG icon helpers ────────────────────────────────────────────────────────

function chevronRight() { return '<span class="icon"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>'; }
function chevronDown() { return '<span class="icon"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>'; }
function iconSearch() { return '<span class="icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>'; }
function iconX() { return '<span class="icon"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>'; }
function iconBook() { return '<span class="icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>'; }
function iconInfo() { return '<span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>'; }
function iconSparkles() { return '<span class="icon"><svg viewBox="0 0 24 24"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg></span>'; }
function iconClock() { return '<span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>'; }
function iconMsg() { return '<span class="icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>'; }
function iconSun() { return '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'; }
function iconMoon() { return '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'; }


// ── App State ───────────────────────────────────────────────────────────────

let laws = [];
let hierarchy = {};
let roots = [];
let expandedRoot = null, expandedL2 = null, expandedL3 = null, expandedL4 = null;
let selectedLaw = null;
let sideTab = 'study';
let fetchedVerse = null;
let verseCache = {};
let keywordResults = null;
let searchQuery = '';
let showSearch = false;
let lightMode = {{INITIAL_MODE}};

// ── Data loading ────────────────────────────────────────────────────────────

function initData(data) {
  laws = data;
  hierarchy = buildHierarchyTree(laws);
  roots = [];
  if (hierarchy['love-god']) {
    roots.push({ key: 'love-god', label: 'LOVE YHWH', subtitle: 'with all your heart', node: hierarchy['love-god'], color: [220, 190, 130] });
  }
  if (hierarchy['love-neighbor']) {
    roots.push({ key: 'love-neighbor', label: 'LOVE YOUR NEIGHBOR', subtitle: 'as yourself', node: hierarchy['love-neighbor'], color: [170, 195, 130] });
  }
  renderAccordion();
  renderBreadcrumbs();
}

// ── Theme switching ─────────────────────────────────────────────────────────

const darkVars = {{{DARK_VARS_JSON}}};
const lightVars = {{{LIGHT_VARS_JSON}}};

function applyTheme() {
  const vars = lightMode ? lightVars : darkVars;
  const root = document.documentElement;
  for (const [k, v] of Object.entries(vars)) {
    root.style.setProperty(k, v);
  }
  const iconEl = document.getElementById('theme-icon');
  if (iconEl) iconEl.innerHTML = lightMode ? iconMoon() : iconSun();
  document.getElementById('theme-toggle').title = lightMode ? 'Switch to dark mode' : 'Switch to light mode';
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  lightMode = !lightMode;
  applyTheme();
  renderAccordion();
  renderBreadcrumbs();
});

// ── Breadcrumbs ─────────────────────────────────────────────────────────────

function renderBreadcrumbs() {
  const crumbs = ['Torah Laws'];
  if (expandedRoot) crumbs.push(expandedRoot === 'love-god' ? 'LOVE YHWH' : 'LOVE YOUR NEIGHBOR');
  if (expandedL2) {
    const config = LEVEL2_CONFIG[expandedL2];
    crumbs.push(config ? config.label : formatLabel(expandedL2));
  }
  if (expandedL3) crumbs.push(formatLabel(expandedL3));
  if (expandedL4) crumbs.push(formatLabel(expandedL4));

  const el = document.getElementById('breadcrumbs');
  el.innerHTML = crumbs.map((crumb, i) => {
    const isLast = i === crumbs.length - 1;
    return `<span class="breadcrumb">${i > 0 ? '<span class="sep">//</span>' : ''}<button class="breadcrumb-btn ${isLast ? 'active' : ''}" data-level="${i}" ${isLast ? 'disabled' : ''}>${escapeHtml(crumb)}</button></span>`;
  }).join('');

  el.querySelectorAll('.breadcrumb-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const level = parseInt(btn.dataset.level);
      if (level <= 0) { expandedRoot = null; expandedL2 = null; expandedL3 = null; expandedL4 = null; }
      else if (level <= 1) { expandedL2 = null; expandedL3 = null; expandedL4 = null; }
      else if (level <= 2) { expandedL3 = null; expandedL4 = null; }
      else if (level <= 3) { expandedL4 = null; }
      renderAccordion();
      renderBreadcrumbs();
    });
  });
}

// ── Search ──────────────────────────────────────────────────────────────────

function getSearchResults(q) {
  if (!q || q.length < 2) return [];
  const lower = q.toLowerCase();
  return laws.filter(law => {
    const text = [law.reference, law.law_summary, law.verse_text].join(' ').toLowerCase();
    return text.includes(lower);
  }).slice(0, 15);
}

function renderSearchOpen() {
  const container = document.getElementById('header-search');
  container.innerHTML = `
    <div class="search-container">
      <span class="search-icon">${iconSearch()}</span>
      <input type="text" placeholder="Search laws..." class="search-input" id="search-input" value="${escapeHtml(searchQuery)}">
      <button class="search-close" id="search-close-btn">${iconX()}</button>
    </div>
    <div id="search-results-container"></div>
  `;
  const input = document.getElementById('search-input');
  input.focus();
  input.addEventListener('input', () => {
    searchQuery = input.value;
    renderSearchResults();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { searchQuery = ''; showSearch = false; renderSearchClosed(); }
  });
  document.getElementById('search-close-btn').addEventListener('click', () => {
    searchQuery = ''; showSearch = false; renderSearchClosed();
  });
  renderSearchResults();
}

function renderSearchResults() {
  const container = document.getElementById('search-results-container');
  if (!container) return;
  const results = getSearchResults(searchQuery);
  if (results.length > 0) {
    container.innerHTML = `<div class="search-dropdown">${results.map(law =>
      `<button class="search-result" data-law-id="${law.id}">
        <span class="search-result-ref">${escapeHtml(law.reference)}</span>
        <span class="search-result-title">${escapeHtml(getShortTitle(law, 60))}</span>
      </button>`
    ).join('')}</div>`;
    container.querySelectorAll('.search-result').forEach(btn => {
      btn.addEventListener('click', () => {
        const law = laws.find(l => l.id == btn.dataset.lawId);
        if (law) navigateToLaw(law);
      });
    });
  } else if (searchQuery.length >= 2) {
    container.innerHTML = `<div class="search-dropdown"><div class="search-no-results">No laws found</div></div>`;
  } else {
    container.innerHTML = '';
  }
}

function renderSearchClosed() {
  const container = document.getElementById('header-search');
  container.innerHTML = `<button class="nav-btn" id="search-toggle" title="Search laws">${iconSearch()}</button>`;
  document.getElementById('search-toggle').addEventListener('click', () => {
    showSearch = true;
    renderSearchOpen();
  });
}

document.getElementById('search-toggle').addEventListener('click', () => {
  showSearch = true;
  renderSearchOpen();
});

function navigateToLaw(law) {
  const paths = law.categories || [];
  if (paths.length > 0) {
    const parts = paths[0].split(' > ').map(s => s.trim());
    if (parts[0]) expandedRoot = parts[0];
    if (parts[1]) expandedL2 = parts[1];
    if (parts[2]) expandedL3 = parts[2];
    if (parts[3]) expandedL4 = parts[3];
  }
  selectLaw(law);
  searchQuery = '';
  showSearch = false;
  renderSearchClosed();
  renderAccordion();
  renderBreadcrumbs();
}

// ── Side Panel ──────────────────────────────────────────────────────────────

function selectLaw(law) {
  selectedLaw = law;
  sideTab = 'study';
  fetchedVerse = null;
  keywordResults = null;
  renderSidePanel();
  renderAccordion();
  const body = document.getElementById('accordion-body');
  if (selectedLaw) body.classList.add('panel-open');
  else body.classList.remove('panel-open');
}

function closeLaw() {
  selectedLaw = null;
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('accordion-body').classList.remove('panel-open');
  renderAccordion();
}

document.getElementById('panel-close').addEventListener('click', closeLaw);

document.getElementById('tab-study').addEventListener('click', () => { sideTab = 'study'; renderSidePanelTabs(); renderSidePanelBody(); });
document.getElementById('tab-details').addEventListener('click', () => { sideTab = 'details'; renderSidePanelTabs(); renderSidePanelBody(); });

function renderSidePanel() {
  const panel = document.getElementById('side-panel');
  if (!selectedLaw) { panel.classList.remove('open'); return; }
  panel.classList.add('open');
  document.getElementById('panel-title').textContent = selectedLaw.reference;
  document.getElementById('panel-eternal-icon').style.display = selectedLaw.has_forever_language ? '' : 'none';
  renderSidePanelTabs();
  renderSidePanelBody();
}

function renderSidePanelTabs() {
  document.getElementById('tab-study').className = 'side-panel-tab' + (sideTab === 'study' ? ' active' : '');
  document.getElementById('tab-details').className = 'side-panel-tab' + (sideTab === 'details' ? ' active' : '');
}

function renderSidePanelBody() {
  const body = document.getElementById('panel-body');
  if (!selectedLaw) { body.innerHTML = ''; return; }

  if (sideTab === 'study') {
    let html = '';

    // Verse text
    html += `<section class="side-panel-section">
      <h3 class="side-panel-label">Verse Text</h3>
      <blockquote class="side-panel-verse">${escapeHtml(selectedLaw.verse_text || '')}</blockquote>
    </section>`;

    // Law summary
    html += `<section class="side-panel-section">
      <h3 class="side-panel-label">Law Summary</h3>
      <p class="side-panel-text">${escapeHtml(selectedLaw.law_summary || '')}</p>
    </section>`;

    // Eternal language
    if (selectedLaw.has_forever_language || selectedLaw.has_generational_language) {
      html += `<section class="side-panel-section side-panel-eternal">
        <h3 class="side-panel-label">${iconSparkles()} Eternal Language</h3>`;
      if (selectedLaw.has_forever_language && selectedLaw.forever_phrase)
        html += `<p class="side-panel-text side-panel-phrase">"${escapeHtml(selectedLaw.forever_phrase)}"</p>`;
      if (selectedLaw.has_generational_language && selectedLaw.generational_phrase)
        html += `<p class="side-panel-text side-panel-phrase">"${escapeHtml(selectedLaw.generational_phrase)}"</p>`;
      html += '</section>';
    }

    // Cross references
    if (selectedLaw.cross_references && selectedLaw.cross_references.length > 0) {
      html += `<section class="side-panel-section">
        <h3 class="side-panel-label">${iconBook()} Cross References</h3>
        <div class="side-panel-refs">
          ${selectedLaw.cross_references.map(ref => `<button class="verse-ref-btn" data-ref="${escapeHtml(ref)}">${escapeHtml(ref)}</button>`).join('')}
        </div>
      </section>`;
    }

    // Related verses
    if (selectedLaw.other_torah_refs) {
      const refs = Array.isArray(selectedLaw.other_torah_refs)
        ? selectedLaw.other_torah_refs
        : selectedLaw.other_torah_refs.split(/,\s*(?=[A-Z0-9])/);
      const cleanRefs = refs.map(r => (r || '').trim()).filter(Boolean);
      if (cleanRefs.length > 0) {
        html += `<section class="side-panel-section">
          <h3 class="side-panel-label">${iconBook()} Related Verses</h3>
          <div class="side-panel-refs">
            ${cleanRefs.map(ref => `<button class="verse-ref-btn" data-ref="${escapeHtml(ref)}">${escapeHtml(ref)}</button>`).join('')}
          </div>
        </section>`;
      }
    }

    // Fetched verse
    html += '<div id="fetched-verse-area"></div>';

    // Keywords
    if (!fetchedVerse && selectedLaw.verse_text) {
      const kws = extractKeywords(selectedLaw.verse_text);
      if (kws.length > 0) {
        html += `<section class="side-panel-section">
          <h3 class="side-panel-label">${iconSearch()} Search by Keyword</h3>
          <div class="keyword-tags">
            ${kws.map(kw => `<button class="keyword-tag" data-keyword="${escapeHtml(kw)}">${escapeHtml(kw)}</button>`).join('')}
          </div>
        </section>`;
      }
    }

    // Keyword results
    html += '<div id="keyword-results-area"></div>';

    body.innerHTML = html;

    // Wire up verse ref buttons
    body.querySelectorAll('.verse-ref-btn').forEach(btn => {
      btn.addEventListener('click', () => fetchVerseAPI(btn.dataset.ref));
    });
    // Wire up keyword tags
    body.querySelectorAll('.keyword-tag').forEach(btn => {
      btn.addEventListener('click', () => searchKeywordAPI(btn.dataset.keyword));
    });

    // Render fetched verse if exists
    if (fetchedVerse) renderFetchedVerse();
    if (keywordResults) renderKeywordResults();

  } else {
    // Details tab
    let html = '<section class="side-panel-section side-panel-grid"><h3 class="side-panel-label">Classification</h3>';
    html += `<div class="side-panel-field"><span class="side-panel-field-label">Duration</span><span class="side-panel-field-value">${escapeHtml((selectedLaw.duration_type || 'Not analyzed').replace(/_/g, ' '))}</span></div>`;
    html += `<div class="side-panel-field"><span class="side-panel-field-label">Applicability</span><span class="side-panel-field-value">${escapeHtml((selectedLaw.current_applicability || 'Not analyzed').replace(/_/g, ' '))}</span></div>`;
    html += `<div class="side-panel-field"><span class="side-panel-field-label">Regulated Party</span><span class="side-panel-field-value">${escapeHtml(selectedLaw.regulated_party || 'Not specified')}</span></div>`;

    if (selectedLaw.observance_class) {
      const obs = OBSERVANCE_CONFIG[selectedLaw.observance_class];
      html += `<div class="side-panel-field"><span class="side-panel-field-label">Observance</span><span class="side-panel-field-value side-panel-observance"><span style="color:${obs?.color || 'inherit'}">${obs?.symbol || ''}</span> ${escapeHtml(obs?.label || selectedLaw.observance_class.replace(/_/g, ' '))}</span></div>`;
    }

    if (selectedLaw.categories && selectedLaw.categories.length > 0) {
      const catText = selectedLaw.categories.map(c => c.split(' > ').slice(1).join(' > ')).join('; ');
      html += `<div class="side-panel-field"><span class="side-panel-field-label">Category</span><span class="side-panel-field-value">${escapeHtml(catText)}</span></div>`;
    }
    html += '</section>';

    // Prerequisites
    if (selectedLaw.requires_temple || selectedLaw.requires_priesthood || selectedLaw.requires_land_israel) {
      const hasPrereq = (v) => v && v !== 'no';
      if (hasPrereq(selectedLaw.requires_temple) || hasPrereq(selectedLaw.requires_priesthood) || hasPrereq(selectedLaw.requires_land_israel)) {
        html += `<section class="side-panel-section"><h3 class="side-panel-label">${iconClock()} Prerequisites</h3>`;
        if (hasPrereq(selectedLaw.requires_temple))
          html += `<p class="side-panel-prereq">Temple: ${escapeHtml(selectedLaw.requires_temple)}</p>`;
        if (hasPrereq(selectedLaw.requires_priesthood))
          html += `<p class="side-panel-prereq">Priesthood: ${escapeHtml(selectedLaw.requires_priesthood)}</p>`;
        if (hasPrereq(selectedLaw.requires_land_israel))
          html += `<p class="side-panel-prereq">Land of Israel: ${escapeHtml(selectedLaw.requires_land_israel)}</p>`;
        html += '</section>';
      }
    }

    // Reasoning
    if (selectedLaw.classification_reasoning) {
      html += `<section class="side-panel-section"><h3 class="side-panel-label">Reasoning</h3><p class="side-panel-text">${escapeHtml(selectedLaw.classification_reasoning)}</p></section>`;
    }

    // Notes
    if (selectedLaw.notes) {
      html += `<section class="side-panel-section"><h3 class="side-panel-label">${iconMsg()} Notes</h3><p class="side-panel-text">${escapeHtml(selectedLaw.notes)}</p></section>`;
    }

    body.innerHTML = html;
  }
}

// ── Verse fetching ──────────────────────────────────────────────────────────

function fetchVerseAPI(ref) {
  const cleanRef = ref.replace(/\s*\(.*?\)\s*/g, '').trim();
  if (!cleanRef) return;

  if (verseCache[cleanRef]) {
    fetchedVerse = { reference: cleanRef, text: verseCache[cleanRef], loading: false, error: null };
    renderFetchedVerse();
    return;
  }

  fetchedVerse = { reference: cleanRef, text: null, loading: true, error: null };
  renderFetchedVerse();

  const apiRef = cleanRef.replace(/\s+/g, '+');
  fetch(`https://bible-api.com/${encodeURIComponent(apiRef)}`)
    .then(res => { if (!res.ok) throw new Error('Verse not found'); return res.json(); })
    .then(data => {
      const text = (data.text || '').trim();
      if (!text) throw new Error('No text returned');
      verseCache[cleanRef] = text;
      fetchedVerse = { reference: data.reference || cleanRef, text, loading: false, error: null };
      renderFetchedVerse();
    })
    .catch(() => {
      fetchedVerse = { reference: cleanRef, text: null, loading: false, error: 'Could not load verse' };
      renderFetchedVerse();
    });
}

function renderFetchedVerse() {
  const area = document.getElementById('fetched-verse-area');
  if (!area || !fetchedVerse) { if (area) area.innerHTML = ''; return; }

  let html = `<section class="side-panel-section side-panel-fetched-verse">
    <div class="fetched-verse-header">
      <h3 class="side-panel-label">${iconBook()} ${escapeHtml(fetchedVerse.reference)}</h3>
      <button class="fetched-verse-close" id="close-fetched-verse">${iconX()}</button>
    </div>`;
  if (fetchedVerse.loading) html += '<p class="side-panel-text fetched-verse-loading">Loading verse...</p>';
  if (fetchedVerse.error) html += `<p class="side-panel-text fetched-verse-error">${escapeHtml(fetchedVerse.error)}</p>`;
  if (fetchedVerse.text) {
    html += `<blockquote class="side-panel-verse">${escapeHtml(fetchedVerse.text)}</blockquote>`;
    const kws = extractKeywords(fetchedVerse.text);
    if (kws.length > 0) {
      html += `<div class="keyword-tags">${kws.map(kw => `<button class="keyword-tag" data-keyword="${escapeHtml(kw)}">${escapeHtml(kw)}</button>`).join('')}</div>`;
    }
  }
  html += '</section>';
  area.innerHTML = html;

  const closeBtn = document.getElementById('close-fetched-verse');
  if (closeBtn) closeBtn.addEventListener('click', () => { fetchedVerse = null; area.innerHTML = ''; });

  area.querySelectorAll('.keyword-tag').forEach(btn => {
    btn.addEventListener('click', () => searchKeywordAPI(btn.dataset.keyword));
  });
}

// ── Keyword search ──────────────────────────────────────────────────────────

function searchKeywordAPI(keyword) {
  keywordResults = { keyword, results: [], loading: true, error: null };
  renderKeywordResults();

  fetch(`https://bolls.life/search/WEB/${encodeURIComponent(keyword)}/`)
    .then(res => { if (!res.ok) throw new Error('Search failed'); return res.json(); })
    .then(data => {
      const results = (data || []).slice(0, 20).map(v => ({
        reference: `${BOOK_NAMES[v.book] || 'Book ' + v.book} ${v.chapter}:${v.verse}`,
        text: (v.text || '').replace(/<\/?mark>/g, ''),
        highlighted: v.text || '',
      }));
      keywordResults = { keyword, results, loading: false, error: null };
      renderKeywordResults();
    })
    .catch(() => {
      keywordResults = { keyword, results: [], loading: false, error: 'Search failed' };
      renderKeywordResults();
    });
}

function renderKeywordResults() {
  const area = document.getElementById('keyword-results-area');
  if (!area || !keywordResults) { if (area) area.innerHTML = ''; return; }

  let html = `<section class="side-panel-section side-panel-keyword-results">
    <div class="fetched-verse-header">
      <h3 class="side-panel-label">${iconSearch()} "${escapeHtml(keywordResults.keyword)}" in Scripture</h3>
      <button class="fetched-verse-close" id="close-keyword-results">${iconX()}</button>
    </div>`;
  if (keywordResults.loading) html += '<p class="side-panel-text fetched-verse-loading">Searching...</p>';
  if (keywordResults.error) html += `<p class="side-panel-text fetched-verse-error">${escapeHtml(keywordResults.error)}</p>`;
  if (keywordResults.results.length > 0) {
    html += '<div class="keyword-results-list">';
    keywordResults.results.forEach(r => {
      html += `<div class="keyword-result-item">
        <button class="keyword-result-ref" data-ref="${escapeHtml(r.reference)}">${escapeHtml(r.reference)}</button>
        <p class="keyword-result-text">${r.highlighted}</p>
      </div>`;
    });
    html += '</div>';
  } else if (!keywordResults.loading && !keywordResults.error) {
    html += '<p class="side-panel-text fetched-verse-loading">No results found</p>';
  }
  html += '</section>';
  area.innerHTML = html;

  const closeBtn = document.getElementById('close-keyword-results');
  if (closeBtn) closeBtn.addEventListener('click', () => { keywordResults = null; area.innerHTML = ''; });

  area.querySelectorAll('.keyword-result-ref').forEach(btn => {
    btn.addEventListener('click', () => fetchVerseAPI(btn.dataset.ref));
  });
}

// ── Accordion Rendering ─────────────────────────────────────────────────────

function renderAccordion() {
  const body = document.getElementById('accordion-body');
  let html = '';

  roots.forEach(root => {
    const rootCount = countAllLaws(root.node);
    const isRootOpen = expandedRoot === root.key;
    const [r, g, b] = catColor(root.color);
    const l2Keys = Object.keys(root.node._children);

    html += `<div class="accordion-root">
      <button class="accordion-row accordion-row-root ${isRootOpen ? 'open' : ''}" data-toggle="root" data-key="${root.key}" style="--cat-r:${r};--cat-g:${g};--cat-b:${b}">
        <span class="accordion-chevron">${isRootOpen ? chevronDown() : chevronRight()}</span>
        <span class="accordion-root-label">${escapeHtml(root.label)}</span>
        <span class="accordion-root-subtitle">${escapeHtml(root.subtitle)}</span>
        <span class="accordion-row-count">${rootCount} laws</span>
      </button>`;

    if (isRootOpen) {
      html += '<div class="accordion-root-content">';
      l2Keys.forEach(l2Key => {
        const l2Data = root.node._children[l2Key];
        const l2Count = countAllLaws(l2Data);
        const config = LEVEL2_CONFIG[l2Key] || { label: formatLabel(l2Key), short: '', color: [148, 163, 184] };
        const isL2Open = expandedL2 === l2Key;
        const [lr, lg, lb] = catColor(config.color);

        html += `<div class="accordion-l2">
          <button class="accordion-row accordion-row-l2 ${isL2Open ? 'open' : ''}" data-toggle="l2" data-key="${l2Key}" style="--cat-r:${lr};--cat-g:${lg};--cat-b:${lb}">
            <span class="accordion-chevron">${isL2Open ? chevronDown() : chevronRight()}</span>
            <span class="accordion-row-label">${escapeHtml(config.label)}${config.short ? `<span class="accordion-l2-num"> ${escapeHtml(config.short)}</span>` : ''}</span>
            <span class="accordion-row-count">${l2Count} ${l2Count === 1 ? 'law' : 'laws'}</span>
          </button>`;

        if (isL2Open) {
          html += '<div class="accordion-l2-content">';
          html += renderL3(l2Data, config.color);
          html += '</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  body.innerHTML = html;
  wireAccordionEvents(body);
}

function renderL3(l2Data, parentColor) {
  const l3Keys = Object.keys(l2Data._children);
  if (l3Keys.length === 0) {
    return '<div class="accordion-laws">' + renderLawButtons(collectAllLaws(l2Data), parentColor) + '</div>';
  }

  let html = '';
  l3Keys.forEach(l3Key => {
    const l3Data = l2Data._children[l3Key];
    const lawCount = countAllLaws(l3Data);
    const isOpen = expandedL3 === l3Key;
    const [r, g, b] = catColor(parentColor);

    html += `<div class="accordion-l3">
      <button class="accordion-row accordion-row-l3 ${isOpen ? 'open' : ''}" data-toggle="l3" data-key="${l3Key}" style="--cat-r:${r};--cat-g:${g};--cat-b:${b}">
        <span class="accordion-chevron">${isOpen ? chevronDown() : chevronRight()}</span>
        <span class="accordion-row-label">${escapeHtml(formatLabel(l3Key))}</span>
        <span class="accordion-row-count">${lawCount} ${lawCount === 1 ? 'law' : 'laws'}</span>
      </button>`;

    if (isOpen) {
      html += '<div class="accordion-l3-content">';
      html += renderL4(l3Data, parentColor);
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

function renderL4(l3Data, parentColor) {
  const l4Keys = Object.keys(l3Data._children);
  if (l4Keys.length === 0) {
    return '<div class="accordion-laws">' + renderLawButtons(collectAllLaws(l3Data), parentColor) + '</div>';
  }

  let html = '';
  l4Keys.forEach(l4Key => {
    const l4Data = l3Data._children[l4Key];
    const lawCount = countAllLaws(l4Data);
    const isOpen = expandedL4 === l4Key;
    const [r, g, b] = catColor(parentColor);

    html += `<div class="accordion-l4">
      <button class="accordion-row accordion-row-l4 ${isOpen ? 'open' : ''}" data-toggle="l4" data-key="${l4Key}" style="--cat-r:${r};--cat-g:${g};--cat-b:${b}">
        <span class="accordion-chevron">${isOpen ? chevronDown() : chevronRight()}</span>
        <span class="accordion-row-label">${escapeHtml(formatLabel(l4Key))}</span>
        <span class="accordion-row-count">${lawCount} ${lawCount === 1 ? 'law' : 'laws'}</span>
      </button>`;

    if (isOpen) {
      html += '<div class="accordion-laws">';
      html += renderLawButtons(collectAllLaws(l4Data), parentColor);
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

function renderLawButtons(lawsArray, color) {
  const [r, g, b] = catColor(color);
  return lawsArray.map(law => {
    const obsConfig = law.observance_class ? OBSERVANCE_CONFIG[law.observance_class] : null;
    const isSelected = selectedLaw && selectedLaw.id === law.id;
    return `<button class="accordion-law ${isSelected ? 'selected' : ''}" data-law-id="${law.id}">
      <span class="accordion-law-ref" style="color:rgb(${r},${g},${b})">${escapeHtml(law.reference)}</span>
      <span class="accordion-law-summary">${escapeHtml(getShortTitle(law, 80))}</span>
      ${obsConfig ? `<span class="accordion-law-obs" style="color:${obsConfig.color}">${obsConfig.symbol}</span>` : ''}
    </button>`;
  }).join('');
}

function wireAccordionEvents(container) {
  container.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const level = btn.dataset.toggle;
      const key = btn.dataset.key;
      if (level === 'root') {
        expandedRoot = expandedRoot === key ? null : key;
        expandedL2 = null; expandedL3 = null; expandedL4 = null;
      } else if (level === 'l2') {
        expandedL2 = expandedL2 === key ? null : key;
        expandedL3 = null; expandedL4 = null;
      } else if (level === 'l3') {
        expandedL3 = expandedL3 === key ? null : key;
        expandedL4 = null;
      } else if (level === 'l4') {
        expandedL4 = expandedL4 === key ? null : key;
      }
      renderAccordion();
      renderBreadcrumbs();
    });
  });

  container.querySelectorAll('.accordion-law').forEach(btn => {
    btn.addEventListener('click', () => {
      const law = laws.find(l => l.id == btn.dataset.lawId);
      if (law) selectLaw(law);
    });
  });
}

// ── Initialize ──────────────────────────────────────────────────────────────

applyTheme();

if (typeof TORAH_LAWS_DATA !== 'undefined') {
  initData(TORAH_LAWS_DATA);
} else if (typeof TORAH_LAWS_LOADER !== 'undefined') {
  TORAH_LAWS_LOADER().then(data => initData(data));
}
